<!DOCTYPE html>
<html>
<head><title>Product Dashboard</title></head>
<body>
    <h1>Your Products</h1>
    {% if products %}
        <ul>
        {% for p in products %}
            <li>{{ p.name }} (ID: {{ p.product_id }}, version {{ p.version }}) – Status: {{ p.status }}</li>
        {% endfor %}
        </ul>
    {% else %}
        <p>No products yet. Use the API to create one.</p>
    {% endif %}
    <div><a href="/product_reg/products/" 
        target="_blank"
        rel="noopener noreferrer"
        style="
        display: inline-block;
        padding: 8px 12px;
        margin-left: 15px;
        margin-bottom: 15px;
        border-radius: 6px;
        background: #007bff;
        color: #fff;
        text-decoration: none;">
        Add new Product</a></div>
    <div><a href="/defects/reports/dashboard/"
        target="_blank"
        rel="noopener noreferrer"
        style="
        display: inline-block;
        padding: 8px 12px;
        margin-left: 15px;
        border-radius: 6px;
        background: #007bff;
        color: #fff;
        text-decoration: none;">
        Return to Dashboard</a></div>
    
</body>
</html>
