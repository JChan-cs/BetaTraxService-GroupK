  /defects/reports/:
    get:
      operationId: defects_reports_list
      description: |-
        Override list to render an HTML template when HTML is requested.

        - If the client accepts HTML, render 'defects/reports.html' with the defects queryset.
        - Otherwise, return the normal JSON serialized response.
      parameters:
      - in: query
        name: format
        schema:
          type: string
          enum:
          - html
          - json
      tags:
      - defects
      security:
      - cookieAuth: []
      - basicAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/DefectReport'
            text/html:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/DefectReport'
          description: ''
    post:
