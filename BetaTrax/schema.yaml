openapi: 3.0.3
info:
  title: BetaTrax API
  version: 0.1.0
  description: API documentation for BetaTrax
paths:
  /assigned/{id}/status/:
    patch:
      operationId: assigned_status_partial_update
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - assigned
      security:
      - cookieAuth: []
      - basicAuth: []
      responses:
        '200':
          description: No response body
  /comments/api/comments/:
