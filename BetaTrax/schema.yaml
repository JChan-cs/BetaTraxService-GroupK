components:
  schemas:
    BlankEnum:
      enum:
      - ''
    Comment:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        author:
          type: string
          description: Required. 150 characters or fewer. Letters, digits and @/./+/-/_
            only.
          readOnly: true
        text:
          type: string
        created_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - author
      - created_at
      - id
      - text
    DefectReport:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        ProductID:
          type: string
          maxLength: 30
        Version:
          type: string
          maxLength: 30
        ReportTitle:
          type: string
          maxLength: 30
        Description:
          type: string
          maxLength: 200
        Steps:
          type: string
        TesterID:
          type: string
          maxLength: 30
        Email:
          type: string
          format: email
          nullable: true
          maxLength: 254
        Status:
          allOf:
          - $ref: '#/components/schemas/StatusEnum'
          readOnly: true
        Severity:
          nullable: true
          oneOf:
          - $ref: '#/components/schemas/SeverityEnum'
          - $ref: '#/components/schemas/BlankEnum'
          - $ref: '#/components/schemas/NullEnum'
        Priority:
          nullable: true
          oneOf:
          - $ref: '#/components/schemas/PriorityEnum'
          - $ref: '#/components/schemas/BlankEnum'
          - $ref: '#/components/schemas/NullEnum'
        CreatedTime:
          type: string
          format: date-time
          readOnly: true
        UpdatedTime:
          type: string
          format: date-time
          readOnly: true
        assigned_to:
          type: integer
          readOnly: true
          nullable: true
      required:
      - CreatedTime
      - Description
      - ProductID
      - ReportTitle
      - Status
      - Steps
      - TesterID
      - UpdatedTime
      - Version
      - assigned_to
      - id
    NullEnum:
      enum:
      - null
    PatchedComment:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        author:
          type: string
          description: Required. 150 characters or fewer. Letters, digits and @/./+/-/_
            only.
          readOnly: true
        text:
          type: string
        created_at:
          type: string
          format: date-time
          readOnly: true
    PatchedDefectReport:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        ProductID:
          type: string
          maxLength: 30
        Version:
          type: string
          maxLength: 30
        ReportTitle:
          type: string
          maxLength: 30
        Description:
          type: string
          maxLength: 200
        Steps:
          type: string
        TesterID:
          type: string
          maxLength: 30
        Email:
          type: string
          format: email
          nullable: true
          maxLength: 254
        Status:
          allOf:
          - $ref: '#/components/schemas/StatusEnum'
          readOnly: true
        Severity:
          nullable: true
          oneOf:
          - $ref: '#/components/schemas/SeverityEnum'
          - $ref: '#/components/schemas/BlankEnum'
          - $ref: '#/components/schemas/NullEnum'
        Priority:
          nullable: true
          oneOf:
          - $ref: '#/components/schemas/PriorityEnum'
          - $ref: '#/components/schemas/BlankEnum'
          - $ref: '#/components/schemas/NullEnum'
        CreatedTime:
          type: string
          format: date-time
          readOnly: true
        UpdatedTime:
          type: string
          format: date-time
          readOnly: true
        assigned_to:
          type: integer
          readOnly: true
          nullable: true
    PatchedProduct:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        product_id:
          type: string
          maxLength: 50
        version:
          type: string
          maxLength: 20
        name:
          type: string
          maxLength: 100
        status:
          $ref: '#/components/schemas/StatusEnum'
        created_at:
          type: string
          format: date-time
          readOnly: true
    PatchedResolving:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        report_id:
          type: string
          maxLength: 100
        date:
          type: string
          format: date-time
          readOnly: true
        retest_result:
          type: string
        author:
          type: string
          description: Required. 150 characters or fewer. Letters, digits and @/./+/-/_
            only.
          readOnly: true
    PriorityEnum:
      enum:
      - Critical
      - High
      - Medium
      - Low
      type: string
      description: |-
        * `Critical` - Critical
        * `High` - High
        * `Medium` - Medium
        * `Low` - Low
    Product:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        product_id:
          type: string
          maxLength: 50
        version:
          type: string
          maxLength: 20
        name:
          type: string
          maxLength: 100
        status:
          $ref: '#/components/schemas/StatusEnum'
        created_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - created_at
      - id
      - name
      - product_id
      - version
    Resolving:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        report_id:
          type: string
          maxLength: 100
        date:
          type: string
          format: date-time
          readOnly: true
        retest_result:
          type: string
        author:
          type: string
          description: Required. 150 characters or fewer. Letters, digits and @/./+/-/_
            only.
          readOnly: true
      required:
      - author
      - date
      - id
      - report_id
      - retest_result
    SeverityEnum:
      enum:
      - Critical
      - Major
      - Minor
      - Low
      type: string
      description: |-
        * `Critical` - Critical
        * `Major` - Major
        * `Minor` - Minor
        * `Low` - Low
    StatusEnum:
      enum:
      - New
      - Open
      - Rejected
      - Duplicate
      - Assigned
      - Cannot reproduce
      - Fixed
      - Resolved
      - Reopened
      type: string
      description: |-
        * `New` - New
        * `Open` - Open
        * `Rejected` - Rejected
        * `Duplicate` - Duplicate
        * `Assigned` - Assigned
        * `Cannot reproduce` - Cannot reproduce
        * `Fixed` - Fixed
        * `Resolved` - Resolved
        * `Reopened` - Reopened
  securitySchemes:
    basicAuth:
      type: http
      scheme: basic
    cookieAuth:
      type: apiKey
      in: cookie
      name: sessionid
