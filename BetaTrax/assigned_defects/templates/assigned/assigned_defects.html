<!DOCTYPE html>
<html>
<head>
    <title>My Assigned Defects - BetaTrax</title>
</head>
<body>
    <h1>My Assigned Defects</h1>
    <table border="1">
        <thead>
            <tr>
                <th>ID</th>
                <th>Title</th>
                <th>Priority</th>
                <th>Status</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody>
            {% for defect in defects %}
            <tr>
                <td>{{ defect.id }}</td>
                <td>{{ defect.ReportTitle }}</td>          <!-- was title -->
                <td>{{ defect.Priority|default:"—" }}</td> <!-- was priority -->
                <td>{{ defect.Status }}</td>               <!-- was status -->
                <td>
                    <a href="{% url 'defectreport-detail' defect.id %}">View/Update</a>
                </td>
            </tr>
            {% empty %}
            <tr><td colspan="5">No defects assigned to you.</td></tr>
            {% endfor %}
        </tbody>
    </table>
    <p><a href="{% url 'defectreport-open-defects' %}">Back to Open Defects</a></p>
</body>
</html>
