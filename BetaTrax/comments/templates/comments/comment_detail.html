<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Comment by {{ comment.author }}</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 24px; color: #222; }
    .container { max-width: 900px; margin: 0 auto; }
    header { margin-bottom: 18px; }
    h2 { margin: 0 0 8px 0; font-size: 1.4rem; }
    .meta { color: #666; font-size: 0.95rem; margin-bottom: 12px; }
    .comment-body { white-space: pre-wrap; line-height: 1.6; margin-bottom: 18px; }
    a.button { display: inline-block; padding: 8px 12px; background:#0366d6; color:#fff; text-decoration:none; border-radius:4px; }
    a.button:hover { background:#024f9c; }
    footer { margin-top: 28px; color:#777; font-size:0.9rem; }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h2>Comment by {{ comment.author }}</h2>
      <div class="meta">Posted on {{ comment.created_at|date:"d/m/Y H:i" }}</div>
    </header>

    <section class="comment-body">
      {{ comment.text|linebreaks }}
    </section>

    <p><a class="button" href="{% url 'comment-list' %}">Back to comments</a></p>

    <footer>
      <small>© {{ now|date:"Y" }} BetaTrax</small>
    </footer>
  </div>
</body>
</html>
