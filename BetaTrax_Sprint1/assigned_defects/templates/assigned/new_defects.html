<!DOCTYPE html>
<html>
<head>
    <title>New Defect Reports - BetaTrax</title>
</head>
<body>
    <h1>New Defect Reports (Pending Evaluation)</h1>
    <table border="1">
        <thead>
            <tr>
                <th>ID</th>
                <th>Title</th>
                <th>Tester ID</th>
                <th>Submitted Time</th>
                <th>Status</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody>
            {% for defect in defects %}
            <tr>
                <td>{{ defect.id }}</td>
                <td>{{ defect.ReportTitle }}</td>
                <td>{{ defect.TesterID }}</td>
                <td>{{ defect.CreatedTime|date:"Y-m-d H:i" }}</td>
                <td>{{ defect.Status }}</td>
                <td>
                    <a href="{% url 'defectreport-detail' defect.id %}">Evaluate</a>
                </td>
            </tr>
            {% empty %}
            <tr><td colspan="6">No new defect reports.</td></tr>
            {% endfor %}
        </tbody>
    </table>
</body>
</html>
