<!DOCTYPE html>
<html>
<head>
    <title>My Assigned Defects - BetaTrax</title>
</head>
<body>
    <h1>My Assigned Defects</h1>
    <table border="1">
        <thead>
            <tr>
                <th>ID</th>
                <th>Title</th>
                <th>Priority</th>
                <th>Status</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody>
            {% for defect in defects %}
            <tr>
                <td>{{ defect.id }}</td>
                <td>{{ defect.title }}</td>
                <td>{{ defect.priority|default:"—" }}</td>
                <td>{{ defect.status }}</td>
                <td>
                    <a href="#">View/Update</a> <!-- link will be added later -->
                </td>
            </tr>
            {% empty %}
            <tr><td colspan="5">No defects assigned to you.</td></tr>
            {% endfor %}
        </tbody>
    </table>
    <p><a href="{% url 'open_defects' %}">Back to Open Defects</a></p>
</body>
</html>
